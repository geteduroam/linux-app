name: "Build & publish binaries"

on: [push, pull_request]

jobs:
  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          go-version: ^1.20

      - run: make build
      - uses: actions/upload-artifact@v3
        with:
          path: geteduroam-cli
